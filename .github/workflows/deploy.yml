name: Deploy Backend to EC2

on:
  push:
    branches: [main, master]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Backend

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Write private key exactly as-is (prevents libcrypto/key format issues)
          cat > ~/.ssh/deploy_key << 'KEY'
          ${{ secrets.EC2_SSH_KEY }}
          KEY
          chmod 600 ~/.ssh/deploy_key

          # Optional validation
          if ssh-keygen -l -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "Key format is valid (ssh-keygen)"
          elif openssl rsa -in ~/.ssh/deploy_key -check -noout > /dev/null 2>&1; then
            echo "Key format is valid (openssl rsa)"
          elif openssl pkey -in ~/.ssh/deploy_key -check -noout > /dev/null 2>&1; then
            echo "Key format is valid (openssl pkey)"
          else
            echo "Key format validation failed"
            exit 1
          fi

          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # ✅ ADD THIS STEP (right after Setup SSH)
      - name: SSH debug
        run: |
          EC2_USER="${{ secrets.EC2_USER }}"
          EC2_HOST="${{ secrets.EC2_HOST }}"
          ssh -vvv -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} "whoami"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deployment script
        run: |
          cat > /tmp/ci-deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          set +e
          cd /opt/promora
          SERVICE="${1:-all}"
          echo "Deploying service: $SERVICE"
          echo ""

          echo "Checking for code updates..."
          if [ "$SERVICE" = "frontend" ] || [ "$SERVICE" = "all" ]; then
            if [ -d "Frontend/.git" ]; then
              cd Frontend && git pull origin main 2>/dev/null || git pull origin master 2>/dev/null || true
              cd ..
            else
              echo "Frontend is not a git repository - rebuilding from existing files"
            fi
          fi

          if [ "$SERVICE" = "backend" ] || [ "$SERVICE" = "all" ]; then
            if [ -d "Backend/.git" ]; then
              cd Backend && git pull origin main 2>/dev/null || git pull origin master 2>/dev/null || true
              cd ..
            else
              echo "Backend is not a git repository - rebuilding from existing files"
            fi
          fi

          if [ "$SERVICE" = "mcp" ] || [ "$SERVICE" = "all" ]; then
            if [ -d "MCP-Servers/.git" ]; then
              cd MCP-Servers && git pull origin main 2>/dev/null || git pull origin master 2>/dev/null || true
              cd ..
            else
              echo "MCP-Servers is not a git repository - rebuilding from existing files"
            fi
          fi

          set -e
          echo ""
          echo "Fetching environment from AWS SSM..."
          export AWS_REGION=us-east-2
          export SSM_PREFIX=/
          source scripts/fetch-env-from-ssm.sh

          echo ""
          echo "Deploying containers..."
          if [ "$SERVICE" = "backend" ]; then
            docker compose rm -f backend 2>/dev/null || true
            docker compose build --no-cache backend
            docker compose up -d backend
          elif [ "$SERVICE" = "frontend" ]; then
            docker compose up -d --build frontend
          elif [ "$SERVICE" = "mcp" ]; then
            docker compose up -d --build mcp-server-a mcp-server-b mcp-server-c
          else
            docker compose up -d --build
          fi

          echo ""
          echo "Deployment complete!"
          docker compose ps
          EOF

      - name: Deploy to EC2
        run: |
          EC2_USER="${{ secrets.EC2_USER }}"
          EC2_HOST="${{ secrets.EC2_HOST }}"

          # Copy deployment script to EC2
          scp -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=no \
              /tmp/ci-deploy.sh ${EC2_USER}@${EC2_HOST}:/opt/promora/scripts/ci-deploy.sh

          # Copy Backend src and prisma directories to EC2
          scp -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=no \
              -r src/ ${EC2_USER}@${EC2_HOST}:/opt/promora/Backend/

          scp -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=no \
              -r prisma/ ${EC2_USER}@${EC2_HOST}:/opt/promora/Backend/

          # Copy docker-compose.yml to EC2
          scp -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=no \
              docker-compose.yml ${EC2_USER}@${EC2_HOST}:/opt/promora/

          # Run deployment
          ssh -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o BatchMode=yes \
              ${EC2_USER}@${EC2_HOST} << 'EOF'
            cd /opt/promora
            chmod +x scripts/ci-deploy.sh
            ./scripts/ci-deploy.sh backend
          EOF

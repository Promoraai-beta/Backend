name: Deploy Backend to EC2 via SSM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send deploy command (backend)
        id: send
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          WORKDIR="${{ secrets.SSM_WORKING_DIR }}"
          if [ -z "$WORKDIR" ]; then WORKDIR="/opt/promora"; fi

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend" \
            --parameters commands="cd $WORKDIR && chmod +x scripts/ci-deploy.sh && ./scripts/ci-deploy.sh backend && docker compose ps" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM CommandId: $CMD_ID"

      - name: Wait + print output
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          CMD_ID="${{ steps.send.outputs.command_id }}"

          # wait (max ~2 min)
          for i in $(seq 1 24); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)

            echo "Status: $STATUS"
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              break
            fi
            sleep 5
          done

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --query "CommandInvocations[0].CommandPlugins[0].Output" \
            --output text

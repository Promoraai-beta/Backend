services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promora-backend
    ports:
      - "5001:5001"
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - NODE_ENV=production
      - PORT=5001
      - MCP_USE_DOCKER=true
      # Database (Supabase)
      - DATABASE_URL=${DATABASE_URL}
      # Authentication
      - JWT_SECRET=${JWT_SECRET}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-video}
      # Email Configuration
      - EMAIL_ENABLED=${EMAIL_ENABLED:-true}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME:-Promora Assessment Platform}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      # Supabase SMTP (alternative to regular SMTP)
      - SUPABASE_SMTP_HOST=${SUPABASE_SMTP_HOST}
      - SUPABASE_SMTP_PORT=${SUPABASE_SMTP_PORT}
      - SUPABASE_SMTP_SECURE=${SUPABASE_SMTP_SECURE}
      - SUPABASE_SMTP_USER=${SUPABASE_SMTP_USER}
      - SUPABASE_SMTP_PASS=${SUPABASE_SMTP_PASS}
      # Judge0 (optional)
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
      # CORS
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      # MCP Servers Path
      - MCP_SERVERS_PATH=/app/mcp-servers
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    networks:
      - promora-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Next.js Service
  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5001}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:5001}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: promora-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5001}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:5001}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    depends_on:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    networks:
      - promora-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: promora-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - promora-network

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-proxy
    environment:
      - CONTAINERS=1
      - EXEC=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - promora-network

  # MCP Server A: Job Analysis
  mcp-server-a:
    build:
      context: ../MCP-Servers
      dockerfile: Dockerfile.server-a
    container_name: promora-mcp-server-a
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    networks:
      - promora-network

  # MCP Server B: Template Builder
  mcp-server-b:
    build:
      context: ../MCP-Servers
      dockerfile: Dockerfile.server-b
    container_name: promora-mcp-server-b
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    networks:
      - promora-network

  # MCP Server C: Monitoring
  mcp-server-c:
    build:
      context: ../MCP-Servers
      dockerfile: Dockerfile.server-c
    container_name: promora-mcp-server-c
    environment:
      - BACKEND_URL=${BACKEND_URL}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    networks:
      - promora-network

networks:
  promora-network:
    driver: bridge